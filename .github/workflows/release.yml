name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: darwin-amd64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TARGET=${{ matrix.target }}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          EXT=""
          if [ "${{ matrix.target }}" = "windows-amd64" ]; then
            EXT=".exe"
          fi
          OUTPUT="odin-${{{ matrix.target }}}-${{ steps.version.outputs.VERSION }}${EXT}"
          go build -ldflags="-s -w" -o "$OUTPUT" ./cmd/odin
          echo "OUTPUT=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: ${{ steps.build.outputs.OUTPUT }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  install-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create artifact
        run: |
          sed "s/INSTALL_SCRIPT_VERSION=\".*\"/INSTALL_SCRIPT_VERSION=\"${{ steps.version.outputs.VERSION }}\"/" install.sh > install.sh.tmp
          mv install.sh.tmp install.sh

      - name: Upload Install Script
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    needs: [release, install-script]
    steps:
      - name: Verify release
        run: |
          echo "Release v${{ needs.release.outputs.version }} complete!"
          echo "Binaries published for: linux-amd64, linux-arm64, darwin-amd64, darwin-arm64, windows-amd64"
          echo "Install script published"
