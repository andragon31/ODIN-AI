name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: darwin-amd64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: windows-amd64

    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          
          if [[ -z "$VERSION" || "$VERSION" == "refs/tags/"* ]]; then
            VERSION="0.1.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TARGET=${{ matrix.target }}" >> $GITHUB_OUTPUT

      - name: Build and Package
        id: build
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARGET="${{ matrix.target }}"
          EXT=""
          BINARY_NAME="odin"
          
          if [[ "$TARGET" == windows-* ]]; then
            EXT=".exe"
          fi
          
          # Build target
          go build -ldflags="-s -w -X main.version=v$VERSION" -o "$BINARY_NAME$EXT" ./cmd/odin
          
          # Archive name (e.g., odin_0.1.0_windows_amd64.zip)
          ARCHIVE_NAME="${BINARY_NAME}_${VERSION}_${TARGET//-/_}"
          
          if [[ "$TARGET" == windows-* ]]; then
             ARCHIVE_FILENAME="${ARCHIVE_NAME}.zip"
             # Use 7z on windows runner
             7z a -tzip "$ARCHIVE_FILENAME" "$BINARY_NAME$EXT"
          else
             ARCHIVE_FILENAME="${ARCHIVE_NAME}.tar.gz"
             tar -czf "$ARCHIVE_FILENAME" "$BINARY_NAME"
          fi
          
          # Generate individual checksum
          sha256sum "$ARCHIVE_FILENAME" > checksums.txt
          
          echo "ARCHIVE=$ARCHIVE_FILENAME" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: |
            ${{ steps.build.outputs.ARCHIVE }}
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  install-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ -z "$VERSION" || "$VERSION" == "refs/tags/"* ]]; then
            VERSION="0.1.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create artifact
        shell: bash
        run: |
          sed "s/INSTALL_SCRIPT_VERSION=\".*\"/INSTALL_SCRIPT_VERSION=\"${{ steps.version.outputs.VERSION }}\"/" install.sh > install.sh.tmp
          mv install.sh.tmp install.sh

      - name: Upload Install Script
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    needs: [release, install-script]
    steps:
      - name: Verify release
        run: |
          echo "Release v${{ needs.release.outputs.version }} complete!"
          echo "Binaries published for: linux-amd64, linux-arm64, darwin-amd64, darwin-arm64, windows-amd64"
          echo "Install script published"
